# DO NOT commit a populated copy of this file. Two secrets are needed.
# Either copy this file to secret.yaml (gitignored) and edit, or apply
# them imperatively as shown below.
#
# 1. Camera credentials (always required):
#
#    kubectl -n default create secret generic monitor-config \
#      --from-file=config.json=./config.json \
#      --dry-run=client -o yaml | kubectl apply -f -
#
# 2. Tailscale auth key (only required for first run; tsnet persists
#    its identity to the PVC so later restarts re-auth automatically).
#    Generate a reusable, tagged auth key from the Tailscale admin
#    console, then:
#
#    kubectl -n default create secret generic monitor-tsnet \
#      --from-literal=authkey=tskey-auth-XXXXXXXXXX
---
apiVersion: v1
kind: Secret
metadata:
  name: monitor-config
  namespace: default
type: Opaque
stringData:
  config.json: |
    {
      "listen": ":8080",
      "streams": [
        {
          "id": "vto1",
          "name": "Front Door",
          "host": "192.168.88.200",
          "user": "admin",
          "pass": "REPLACE_ME"
        }
      ]
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: monitor-tsnet
  namespace: default
type: Opaque
stringData:
  authkey: tskey-auth-REPLACE_ME
