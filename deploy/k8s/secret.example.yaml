# DO NOT commit a populated copy of this file. It contains plaintext
# camera credentials. Either:
#
#   1. Copy this file to secret.yaml (gitignored), edit, then
#         kubectl apply -f deploy/k8s/secret.yaml
#
#   2. Or build the Secret directly from your local config.json:
#         kubectl -n default create secret generic monitor-config \
#           --from-file=config.json=./config.json \
#           --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: monitor-config
  namespace: default
type: Opaque
stringData:
  config.json: |
    {
      "listen": ":8080",
      "streams": [
        {
          "id": "vto1",
          "name": "Front Door",
          "host": "192.168.88.200",
          "user": "admin",
          "pass": "REPLACE_ME"
        }
      ]
    }
