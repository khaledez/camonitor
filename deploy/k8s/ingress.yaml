# Tailscale operator picks up Ingresses with ingressClassName=tailscale,
# spins up a per-Ingress proxy StatefulSet, and joins the tailnet using the
# tls.hosts[0] entry as the machine name. This service ends up at
# https://monitor.<tailnet>.ts.net.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitor
  namespace: default
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: monitor
      port:
        number: 8080
  tls:
    - hosts:
        - monitor
