apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: default
  labels:
    app: monitor
spec:
  # tsnet stores per-node WireGuard state in TS_STATE_DIR; only one pod
  # may use a given state dir at a time. Recreate (don't roll) so the
  # new pod always has the volume to itself.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      # The pod shares the node's network namespace. Why:
      #   - SIP REGISTER/INVITE must travel UDP/5060 to/from the cameras
      #     on the LAN. Kubernetes pod networking (Flannel here) reliably
      #     SNATs TCP egress to the LAN but loses the UDP return path,
      #     so pod-to-LAN UDP silently dropped REGISTER replies. Living
      #     directly on the host fixes that.
      #   - tsnet runs entirely in userspace (it builds its own virtual
      #     interface from quic-go-style WireGuard packets), so it is
      #     unaffected by host networking.
      #   - The HTTP listener moves to node:8080 — fine in this homelab
      #     setup; nothing else binds 8080 on zima.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Satisfies the cluster's "restricted" PodSecurity profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monitor
          image: ghcr.io/khaledez/camonitor:0.7.2
          args:
            - -config
            - /etc/camonitor/config.json
            - -tailscale
            - monitor
          env:
            # Auth key consumed on first start; subsequent restarts use
            # the persisted identity in /var/lib/tsnet.
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: monitor-tsnet
                  key: authkey
                  optional: true
            - name: TS_STATE_DIR
              value: /var/lib/tsnet
          ports:
            - name: http
              containerPort: 8080
            # SIP listens on the host's UDP/5060 directly (hostNetwork
            # above), so cameras on the LAN can reach it via the node IP.
            - name: sip
              containerPort: 5060
              protocol: UDP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/camonitor
              readOnly: true
            - name: tsnet-state
              mountPath: /var/lib/tsnet
            - name: camonitor-state
              mountPath: /var/lib/camonitor
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          secret:
            secretName: monitor-config
            items:
              - key: config.json
                path: config.json
        - name: tsnet-state
          persistentVolumeClaim:
            claimName: monitor-tsnet
        - name: camonitor-state
          persistentVolumeClaim:
            claimName: monitor-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-tsnet
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
---
# Holds the WhatsApp linked-device session (SQLite file). Surviving pod
# restarts here is what keeps the QR-code pairing from being needed again.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-state
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
