apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: default
  labels:
    app: monitor
spec:
  # tsnet stores per-node WireGuard state in TS_STATE_DIR; only one pod
  # may use a given state dir at a time. Recreate (don't roll) so the
  # new pod always has the volume to itself.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      # Satisfies the cluster's "restricted" PodSecurity profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monitor
          image: ghcr.io/khaledez/camonitor:0.3.0
          args:
            - -config
            - /etc/camonitor/config.json
            - -tailscale
            - monitor
          env:
            # Auth key consumed on first start; subsequent restarts use
            # the persisted identity in /var/lib/tsnet.
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: monitor-tsnet
                  key: authkey
                  optional: true
            - name: TS_STATE_DIR
              value: /var/lib/tsnet
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/camonitor
              readOnly: true
            - name: tsnet-state
              mountPath: /var/lib/tsnet
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          secret:
            secretName: monitor-config
            items:
              - key: config.json
                path: config.json
        - name: tsnet-state
          persistentVolumeClaim:
            claimName: monitor-tsnet
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-tsnet
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
