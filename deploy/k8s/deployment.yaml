apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: default
  labels:
    app: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      # Satisfies the cluster's "restricted" PodSecurity profile.
      # camonitor is a static binary, has no filesystem writes, and only
      # binds an unprivileged port — none of these caps/UIDs are needed.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monitor
          image: ghcr.io/khaledez/camonitor:0.2.0
          args: ["-config", "/etc/camonitor/config.json"]
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/camonitor
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          secret:
            secretName: monitor-config
            items:
              - key: config.json
                path: config.json
