apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: default
  labels:
    app: monitor
spec:
  # tsnet stores per-node WireGuard state in TS_STATE_DIR; only one pod
  # may use a given state dir at a time. Recreate (don't roll) so the
  # new pod always has the volume to itself.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      # Satisfies the cluster's "restricted" PodSecurity profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monitor
          image: ghcr.io/khaledez/camonitor:0.5.1
          args:
            - -config
            - /etc/camonitor/config.json
            - -tailscale
            - monitor
          env:
            # Auth key consumed on first start; subsequent restarts use
            # the persisted identity in /var/lib/tsnet.
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: monitor-tsnet
                  key: authkey
                  optional: true
            - name: TS_STATE_DIR
              value: /var/lib/tsnet
          ports:
            - name: http
              containerPort: 8080
            # SIP must be reachable from the cameras on the LAN so the VTO
            # can deliver INVITEs (bell presses). hostPort exposes the pod's
            # UDP listener on the node's IP at port 5060. The pod itself
            # listens on UDP/5160 (sip.bind=":5160" in config.json) — using
            # a different containerPort avoids a kernel conntrack collision
            # when sipgo reuses its listener socket for outbound REGISTERs.
            # Cameras still talk to node IP : 5060 (sip.contact_port).
            - name: sip
              containerPort: 5160
              hostPort: 5060
              protocol: UDP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/camonitor
              readOnly: true
            - name: tsnet-state
              mountPath: /var/lib/tsnet
            - name: camonitor-state
              mountPath: /var/lib/camonitor
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          secret:
            secretName: monitor-config
            items:
              - key: config.json
                path: config.json
        - name: tsnet-state
          persistentVolumeClaim:
            claimName: monitor-tsnet
        - name: camonitor-state
          persistentVolumeClaim:
            claimName: monitor-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-tsnet
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
---
# Holds the WhatsApp linked-device session (SQLite file). Surviving pod
# restarts here is what keeps the QR-code pairing from being needed again.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-state
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
